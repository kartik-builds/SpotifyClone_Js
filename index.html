<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/spotifylogo.svg" type="image/x-icon">
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="assets/spotify.svg" width="64" alt="spotifylogo" class="spotify-logo">
                <img src="assets/home.svg" width="40" alt="homelogo" class="home">
            </div>

            <div class="search-box">
                <img src="assets/search_new.svg" width="40" alt="searchlogo" class="search-icon">
                <input type="text" placeholder="What do you want to play?">
            </div>

            <div class="nav-right">
                <ul>
                    <li class="hide-mobile"><a href="#">Premium</a></li>
                    <li class="hide-mobile"><a href="#">Support</a></li>
                    <li class="hide-mobile"><a href="#">Download</a></li>
                    <li class="hide-mobile bar">|</li>
                    <li class="hide-mobile install"><img src="assets/install.svg" width="20" alt="installlogo">Install
                        App</li>
                    <li><a href="#" class="sign">Sign up</a></li>
                    <li><button class="log">Log in</button></li>
                </ul>
            </div>
        </nav>
    </header>
    <div class="sidebar">

        <!-- Header -->
        <div class="sidebar-header">
            <h3>Your Library</h3>
            <button class="create-btn">+ Create</button>
        </div>

        <!-- Scrollable Content -->
        <div class="sidebar-content">

            <div class="card">
                <h4>Create your first playlist</h4>
                <p>It's easy, we'll help you</p>
                <button>Create playlist</button>
            </div>

            <div class="card">
                <h4>Let's find some podcasts to follow</h4>
                <p>We'll keep you updated on new episodes</p>
                <button>Browse podcasts</button>
            </div>

        </div>

        <!-- Footer -->
        <div class="sidebar-footer">
            <div class="links">
                <a href="#">Legal</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Cookies</a>
            </div>

            <button class="lang-btn">🌐 English</button>
        </div>

    </div>
    <main class="content"></main>
</body>

</html>
