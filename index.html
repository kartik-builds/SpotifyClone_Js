<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/spotifylogo.svg" type="image/x-icon">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <img src="assets/spotify.svg" width="64" alt="spotifylogo" class="spotify-logo">
                <img src="assets/home.svg" width="40" alt="homelogo" class="home">
            </div>
            
            <div class="search-box">
                <img src="assets/search_new.svg" width="40" alt="searchlogo" class="search-icon">
                <input type="text" placeholder="What do you want to play?">
            </div>

            <div class="nav-right">
                <ul>
                    <li class="hide-mobile"><a href="#">Premium</a></li>
                    <li class="hide-mobile"><a href="#">Support</a></li>
                    <li class="hide-mobile"><a href="#">Download</a></li>
                    <li class="hide-mobile bar">|</li>
                    <li class="hide-mobile install"><img src="assets/install.svg" width="20" alt="installlogo">Install App</li>
                    <li><a href="#" class="sign">Sign up</a></li>
                    <li><button class="log">Log in</button></li>
                </ul>
            </div>
        </nav>
    </header>
    <div class="layout">
        <aside class="sidebar">
            <nav class="sidebar_nav"><p>Your Library</p><a href="#">
                <img src="assets/plus-icon-symbol-by-Vexels.png" width="32px" alt="plus"></nav>
            </a>
            <div class="container1">
                <div class="box1">
                    <p class="firstchild">Create your first playlist</p>
                    <p>It's easy,we'll help you</p>
                    <button class="log play">Create playlist</button>
                </div>
                <div class="box1 box2">
                    <p class="firstchild">Let's find some podcasts to follow</p>
                    <p>We'll keep you updated on new episodes</p>
                    <button class="log play">Browse podcasts</button>
                </div>
                <footer class="side-footer"></footer>
            </aside>
        <main class="content"></main>
    </div>
</body>
</html>
